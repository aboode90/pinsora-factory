name: Pinsora AI Auto-Poster

on:
  schedule:
    - cron: '0 * * * *' # يعمل كل ساعة تماماً
  workflow_dispatch: # يسمح لك بتشغيله يدوياً أيضاً من GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r image-generator/requirements.txt

      - name: Run Generator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          python image-generator/generator.py --batch 1
