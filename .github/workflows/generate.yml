name: Pinsora Image Factory 🏭

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes (Maximum frequency for free tier)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r image-generator/requirements.txt

      - name: Run Generator
        run: python image-generator/generator.py --once
        env:
          # We'll use GitHub Secrets to keep these safe
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
